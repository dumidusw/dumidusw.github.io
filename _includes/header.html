<header class="site-header" role="banner">
  <div class="wrapper">
    <button
      id="search-toggle"
      class="icon-btn search-toggle"
      type="button"
      aria-label="Search"
      title="Search"
    >
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </button>
    <button
      id="theme-toggle"
      class="icon-btn theme-toggle"
      type="button"
      aria-label="Toggle dark mode"
      title="Toggle dark mode"
    >
      <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
    <a class="site-title" rel="author" href="{{ "/" | relative_url }}">{{ site.title | escape }}</a>
	<img
	  src="{{ '/assets/images/logo-mark-light.png' | relative_url }}"
	  alt=""
	  class="site-logo site-logo-light"
	  width="32"
	  height="32"
	>
	<img
	  src="{{ '/assets/images/logo-mark-dark.png' | relative_url }}"
	  alt=""
	  class="site-logo site-logo-dark"
	  width="32"
	  height="32"
	>
    {%- if site.description -%}
    <p class="site-description">{{ site.description }}</p>
    {%- endif -%}
    <span class="hero-accent-line" aria-hidden="true"></span>
  </div>

  <div class="search-overlay" id="search-overlay" role="dialog" aria-modal="true" aria-label="Search">
    <div class="search-panel">
      <div class="search-input-row">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" class="search-input" id="search-input" placeholder="Search posts..." autocomplete="off">
        <button class="search-close" id="search-close" type="button" aria-label="Close search">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>
</header>
