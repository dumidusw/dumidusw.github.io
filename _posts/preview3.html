<!DOCTYPE html>
<html><head><style>
:root {
  --color-bg-elevated: #f6f6f7; --color-accent: #7c3aed; --color-ink: #1a1a1a;
  --color-muted: #444; --color-muted-light: #888; --color-tag-bg: #ede9fe;
}
body { font-family: -apple-system, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
/* Series box (shown on posts that are part of a series) */
.series-box {
  background: var(--color-bg-elevated);
  border-left: 3px solid var(--color-accent);
  border-radius: 0 8px 8px 0;
  padding: 1rem 1.25rem;
  margin: 1.5rem 0 2rem;
}

.series-box-header {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--color-ink);
  margin-bottom: 0.75rem;
}

.series-box-header .meta-icon {
  color: var(--color-accent);
  flex-shrink: 0;
}

.series-box-count {
  margin-left: auto;
  font-weight: 600;
  font-size: 0.8rem;
  color: var(--color-muted-light);
}

.series-box-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.series-box-list li {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-size: 0.9rem;
}

.series-index {
  flex-shrink: 0;
  width: 1.4rem;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--color-muted-light);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}

.series-title {
  color: var(--color-muted);
  text-decoration: none;
}

.series-box-list li a.series-title:hover {
  color: var(--color-accent);
  text-decoration: underline;
  text-decoration-color: var(--color-accent);
}

.series-current .series-title {
  color: var(--color-ink);
  font-weight: 700;
}

.series-index-done {
  color: var(--color-accent);
  font-weight: 700;
}

.series-index-current {
  color: var(--color-accent);
  font-size: 0.55rem;
}

.series-upcoming {
  opacity: 0.8;
}

/* Related Posts variant (bullet style, no numbered index) */
.related-list li {
  position: relative;
  padding-left: 1rem;
}

.related-list li::before {
  content: "•";
  color: var(--color-accent);
  position: absolute;
  left: 0;
}
</style></head><body>


  
  

  <div class="series-box">
    <div class="series-box-header">
      <svg class="meta-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"></path></svg>
      <span>Continue Reading</span>
      <span class="series-box-count">2 of 4</span>
    </div>
    <ol class="series-box-list">
      
        
          <li>
            <span class="series-index series-index-done">&#10003;</span>
            <a class="series-title" href="/2026-06-20-installing-arch-linux/">Installing Arch Linux</a>
          </li>
        
      
        
          <li class="series-current">
            <span class="series-index series-index-current">&#9679;</span>
            <span class="series-title">Understanding Arch News</span>
          </li>
        
      
        
          <li class="series-upcoming">
            <span class="series-index">3</span>
            <a class="series-title" href="/2026-07-08-A-Safer-Arch-Linux-Update-Workflow/">A Safer Arch Linux Update Workflow</a>
          </li>
        
      
        
          <li class="series-upcoming">
            <span class="series-index">4</span>
            <a class="series-title" href="/2026-07-12-system-report-utility/">System Report Utility</a>
          </li>
        
      
    </ol>
  </div>



</body></html>
